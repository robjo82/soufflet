name: Pull request title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  lint:
    name: Conventional title
    runs-on: ubuntu-latest
    steps:
      - name: Validate Conventional Commit and Gitmoji format
        env:
          TITLE: ${{ github.event.pull_request.title }}
        shell: bash
        run: |
          pattern='^(feat|fix|docs|refactor|perf|test|build|ci|chore|revert)\([a-z0-9._/-]+\): (✨|🐛|📚|♻️|⚡️|✅|🔧|🔥|🎉|🚀|💥|⬆️|⬇️|🔒|📦|🚨) .{1,68}$'
          if printf '%s' "$TITLE" | grep -qE "$pattern" && [ "${#TITLE}" -le 72 ]; then
            echo "✓ Titre conventionnel valide : $TITLE"
          else
            echo "::error::Format attendu : feat(scope): ✨ Titre impératif (72 caractères maximum)."
            exit 1
          fi
