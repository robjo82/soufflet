name: Release and publish

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  release:
    name: Release image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Publish semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
      - name: Resolve image version
        id: version
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          version="$(git tag --points-at HEAD --sort=-version:refname | head -n 1)"
          if [ -z "$version" ]; then version="build-$GITHUB_RUN_NUMBER"; fi
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: registry.robin-joseph.fr
          username: dummy
          password: dummy
      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            registry.robin-joseph.fr/soufflet:latest
            registry.robin-joseph.fr/soufflet:sha-${{ steps.version.outputs.short_sha }}
            registry.robin-joseph.fr/soufflet:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
